    <circle cx="0" cy="0" r="78" fill="none" stroke="#1F4D3F" stroke-width="15"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#1F4D3F" stroke-width="4" opacity="0.45"/>
    <circle cx="0" cy="-78" r="9" fill="#B89968"/>
    <circle cx="0" cy="-78" r="2.8" fill="#F5F1EA"/>
  </g>
  <!-- Divisor -->
