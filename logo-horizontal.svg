<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" width="960" height="260">
  <title>Oranday Studio — Logo horizontal</title>
  <!-- Isotipo -->
